<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Base CSS + Fonts -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/cascadia-code">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- jQuery -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

  <!-- Layout + Effects -->
  <style>
    :root{
      /* Colors (dark-first) */
      --bg:#07080b;
      --ink:#e6e8ee;
      --muted:#a7adbb;
      --line:#21242c;
      --card:#0c0f14;
      --accent1:#7c83ff;
      --accent2:#22d3ee;
      --accent3:#34d399;

      /* FX */
      --ring: conic-gradient(from 180deg, var(--accent1), var(--accent2), var(--accent3), var(--accent1));
      --shadow-1: 0 10px 30px rgba(0,0,0,.35);
      --shadow-2: 0 24px 60px rgba(0,0,0,.55);
      --blur: blur(10px);

      /* Dock */
      --dock-h: 78px;
    }
    @media (prefers-color-scheme: light){
      :root{
        --bg:#f9fafb;
        --ink:#0f172a;
        --muted:#475569;
        --line:#e5e7eb;
        --card:#ffffff;
        --shadow-1: 0 14px 34px rgba(0,0,0,.08);
        --shadow-2: 0 34px 60px rgba(0,0,0,.12);
      }
    }

    html{ scroll-behavior:smooth; }
    body{
      margin:0;
      background:
        radial-gradient(rgba(255,255,255,.032) 1px, transparent 1px),
        radial-gradient(1200px 800px at 10% -10%, rgba(124,131,255,.09), transparent 60%),
        radial-gradient(1000px 700px at 110% 10%, rgba(34,211,238,.09), transparent 60%),
        var(--bg);
      background-size: 28px 28px, auto, auto, auto;
      color:var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji";
      overflow-x:hidden;
    }

    /* ===== Header (sticky glass) ===== */
    header{
      position:sticky; top:0; z-index:50;
      display:grid; grid-template-columns:1fr auto 1fr; align-items:center;
      gap:12px; padding:12px clamp(12px, 3vw, 24px);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      backdrop-filter: blur(12px);
      border-bottom:1px solid var(--line);
      box-shadow: var(--shadow-1);
    }
    header::after{
      content:""; position:absolute; inset:0 0 auto 0; height:2px; pointer-events:none;
      background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent3));
      opacity:.55; transform-origin:left center; transform: scaleX(0);
      transition: transform 1.1s ease;
    }
    body.scrolled header::after{ transform: scaleX(1); }

    .header-links-left, .header-links-right{ display:flex; gap:12px; align-items:center; }

    header h1{
      margin:0; font-weight:900; letter-spacing:.4px;
      font-family: "Cascadia Code", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: clamp(16px, 2vw, 20px);
      background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent3));
      -webkit-background-clip:text; background-clip:text; color:transparent;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,.15));
    }

    /* Header icons — bright neon + magnetic */
    header a{
      --s: 40px;
      width:var(--s); height:var(--s); display:grid; place-items:center;
      border-radius:12px; text-decoration:none; color:#fff;
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
      border:1px solid var(--line);
      transition: transform .22s ease, border-color .22s ease, box-shadow .22s ease, background .22s ease, filter .22s ease;
      position:relative; overflow:hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
    }
    header a i{
      font-size:18px; color:#fff;
      text-shadow:
        0 0 6px rgba(255,255,255,.55),
        0 0 14px rgba(124,131,255,.6),
        0 0 26px rgba(34,211,238,.45);
      filter: brightness(1.05) saturate(1.15);
      transition: transform .22s ease, filter .22s ease, text-shadow .22s ease;
    }
    header a:hover{
      transform: translateY(-2px) scale(1.05) rotateX(1deg);
      border-color: transparent;
      box-shadow: 0 12px 30px rgba(0,0,0,.38), 0 0 0 1px rgba(124,131,255,.22);
      background: linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.08));
      filter: saturate(1.2);
    }
    header a:hover i{
      transform: translateY(-1px) scale(1.1);
      text-shadow:
        0 0 10px rgba(255,255,255,.8),
        0 0 22px rgba(124,131,255,.9),
        0 0 36px rgba(34,211,238,.85);
      filter: brightness(1.22) saturate(1.25);
    }
    header a::after{
      content:""; position:absolute; inset:0;
      background: radial-gradient(140px 140px at var(--mx,50%) var(--my,50%), rgba(124,131,255,.26), transparent 60%);
      opacity:0; transition: opacity .22s ease;
    }
    header a:hover::after{ opacity:1; }

    /* ===== Page Transition Overlay ===== */
    .page-transition{
      position:fixed; inset:0; z-index:100;
      pointer-events:none; opacity:0;
      transform: scale(1);
      transition: opacity .7s ease, transform .7s ease;
    }
    .page-transition::before{
      content:""; position:absolute; inset:0;
      background: radial-gradient(180px 180px at var(--x, 50%) var(--y, 50%),
                   rgba(124,131,255,.7), rgba(34,211,238,.6), transparent 70%);
      filter: blur(20px) saturate(130%);
      clip-path: circle(0% at var(--x,50%) var(--y,50%));
    }
    .page-transition::after{
      content:""; position:absolute; inset:-10%;
      background:
        conic-gradient(from 180deg at 50% 50%,
          rgba(124,131,255,.22),
          rgba(34,211,238,.22),
          rgba(52,211,153,.22),
          transparent 60%);
      filter: blur(30px) saturate(140%);
      opacity:0; transform: rotate(0deg) scale(1);
    }
    .page-transition > .scan{
      position:absolute; inset:0; pointer-events:none; opacity:0;
      background: repeating-linear-gradient(to bottom, rgba(255,255,255,.06) 0 1px, transparent 1px 5px);
    }
    .page-transition.page-transition-active{
      pointer-events:auto; opacity:1; transform: scale(1.06);
    }
    .page-transition.page-transition-active::before{ animation: warpCircle 1.15s ease forwards; }
    .page-transition.page-transition-active::after{ animation: prismSweep 1.15s ease forwards; }
    .page-transition.page-transition-active > .scan{ animation: scanFade 1.15s ease forwards; }

    @keyframes warpCircle{
      0%{ clip-path: circle(0% at var(--x,50%) var(--y,50%)); }
      60%{ clip-path: circle(130% at var(--x,50%) var(--y,50%)); }
      100%{ clip-path: circle(180% at var(--x,50%) var(--y,50%)); }
    }
    @keyframes prismSweep{
      0%{ opacity:0; transform: rotate(0deg) scale(1); }
      40%{ opacity:.75; transform: rotate(18deg) scale(1.06); }
      100%{ opacity:0; transform: rotate(28deg) scale(1.14); }
    }
    @keyframes scanFade{ 0%{opacity:0;} 30%{opacity:.35;} 100%{opacity:0;} }

    /* ===== Scroll progress ===== */
    .scroll-progress{
      position:fixed; top:0; left:0; height:3px; width:0%;
      background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent3));
      z-index:120; box-shadow: 0 0 16px rgba(124,131,255,.45);
      transition: width .1s linear;
    }

    /* ===== Main content reveal & exit ===== */
    #content{
      opacity:0; transform: translateY(6px);
      transition: opacity .65s ease, transform .65s ease, filter .65s ease;
      will-change: opacity, transform, filter;
      min-height: calc(100vh - 160px);
      /* Make room for fixed dock */
      padding-bottom: calc(var(--dock-h) + env(safe-area-inset-bottom) + 16px);
    }
    #content.visible{ opacity:1; transform: translateY(0); }
    #content.leaving{
      filter: blur(8px) saturate(115%);
      opacity:.12;
      transform: scale(.982) translateY(10px);
      transition: filter .7s ease, opacity .7s ease, transform .7s ease;
    }

    /* ===== Floating Dock Footer (always visible) ===== */
    footer{
      position: fixed; left: 0; right: 0;
      bottom: max(0px, env(safe-area-inset-bottom));
      z-index: 90;
      height: var(--dock-h);
      display: grid; place-items: center;
      padding: 0 clamp(10px, 4vw, 24px);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      backdrop-filter: blur(12px) saturate(120%);
      border-top: 1px solid var(--line);
      box-shadow: 0 -18px 48px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.06);
      overflow:hidden;
    }
    footer::before{
      content:""; position:absolute; inset:-40% -10%;
      background:
        radial-gradient(40% 30% at 25% 60%, rgba(124,131,255,.18), transparent 60%),
        radial-gradient(30% 30% at 80% 40%, rgba(34,211,238,.18), transparent 60%);
      filter: blur(44px) saturate(130%);
      pointer-events:none;
    }
    footer ul{
      list-style:none; margin:0; padding:0;
      display:flex; gap:10px; flex-wrap:nowrap;
      overflow:auto hidden; scrollbar-width: none;
    }
    footer ul::-webkit-scrollbar{ display:none; }

    /* ===== HYPERFLUX BUTTONS (insane background) ===== */
    footer li a{
      --mx:50%; --my:50%;
      --c1:#7c83ff; --c2:#22d3ee; --c3:#34d399;
      position:relative;
      display:inline-flex; align-items:center; justify-content:center;
      gap:10px; padding:10px 16px; min-width: max(120px, 11ch);
      color:#fff; text-decoration:none; font-weight:900; letter-spacing:.2px;
      border-radius:16px; border:1px solid rgba(255,255,255,.14);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.08), 0 10px 28px rgba(0,0,0,.35);
      isolation:isolate; /* keep inner glows contained */
      overflow:hidden;
      transform: translateZ(0); /* gpu hint */
      will-change: transform, filter;
    }
    /* per-tab palettes (cycled) */
    #footerNav li:nth-child(1) a{ --c1:#7c83ff; --c2:#22d3ee; --c3:#34d399; }
    #footerNav li:nth-child(2) a{ --c1:#34d399; --c2:#7c83ff; --c3:#22d3ee; }
    #footerNav li:nth-child(3) a{ --c1:#22d3ee; --c2:#34d399; --c3:#7c83ff; }
    #footerNav li:nth-child(4) a{ --c1:#a78bfa; --c2:#60a5fa; --c3:#22d3ee; }
    #footerNav li:nth-child(5) a{ --c1:#fb7185; --c2:#f59e0b; --c3:#34d399; }
    #footerNav li:nth-child(6) a{ --c1:#f472b6; --c2:#7c83ff; --c3:#22d3ee; }

    /* TEXT glow */
    footer li a span.label{
      position:relative; z-index:5;
      text-shadow:
        0 0 6px rgba(255,255,255,.6),
        0 0 16px rgba(124,131,255,.55),
        0 0 26px rgba(34,211,238,.45);
    }

    /* base rainbow motion */
    footer li a .rainbow{
      position:absolute; inset:-40% -10%;
      background: conic-gradient(from 0deg at 50% 50%, var(--c1), var(--c2), var(--c3), var(--c1));
      animation: spin 9s linear infinite;
      opacity:.22;
      z-index:0;
    }
    @keyframes spin{ to{ transform: rotate(360deg); } }

    /* liquid flux blobs */
    footer li a .flux{
      position:absolute; inset:-20% -10%;
      background:
        radial-gradient(130% 200% at 0% 50%, var(--c1) 0%, transparent 60%),
        radial-gradient(130% 200% at 100% 50%, var(--c2) 0%, transparent 60%),
        radial-gradient(160% 240% at 50% 120%, var(--c3) 0%, transparent 60%);
      background-size: 200% 200%, 200% 200%, 200% 200%;
      background-position: 0% 50%, 100% 50%, 50% 100%;
      mix-blend-mode: screen;
      opacity:.55;
      animation: fluxShift 6.6s ease-in-out infinite alternate;
      z-index:1;
    }
    @keyframes fluxShift{
      0%  { background-position: 0% 50%, 100% 50%, 50% 100%; }
      50% { background-position: 50% 0%, 50% 100%, 0% 50%; }
      100%{ background-position: 100% 50%, 0% 50%, 50% 0%; }
    }

    /* starry sparkles */
    footer li a .sparks{
      position:absolute; inset:-1px; border-radius:inherit; pointer-events:none;
      background:
        radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,.9) 0 60%, transparent 70%),
        radial-gradient(1.8px 1.8px at 70% 60%, rgba(255,255,255,.8) 0 60%, transparent 70%),
        radial-gradient(1.6px 1.6px at 40% 80%, rgba(255,255,255,.85) 0 60%, transparent 70%),
        radial-gradient(1.6px 1.6px at 85% 25%, rgba(255,255,255,.9) 0 60%, transparent 70%);
      filter: drop-shadow(0 0 6px rgba(255,255,255,.8));
      opacity:.75;
      mix-blend-mode: screen;
      animation: twinkle 2.2s ease-in-out infinite alternate;
      z-index:3;
    }
    @keyframes twinkle{
      0% { transform: translate3d(0,0,0) scale(1); opacity:.55; }
      100%{ transform: translate3d(1px,-1px,0) scale(1.06); opacity:.95; }
    }

    /* glossy sweep + scan overlays */
    footer li a .sheen{
      position:absolute; top:0; left:-50%; width:40%; height:100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.24), transparent);
      transform: skewX(-20deg);
      opacity:0; pointer-events:none; z-index:4;
    }
    footer li a .scan{
      position:absolute; inset:1px; border-radius:14px; pointer-events:none;
      background: repeating-linear-gradient(to bottom, rgba(255,255,255,.12) 0 1px, transparent 1px 6px);
      opacity: 0; transition: opacity .25s ease; z-index:2;
    }

    /* edge glow ring */
    footer li a::before{
      content:""; position:absolute; inset:-2px; border-radius:18px; pointer-events:none;
      background: var(--ring); filter: blur(14px); opacity:.2; mix-blend-mode: screen;
      z-index:2;
    }
    /* magnetic inner glow (follows cursor) */
    footer li a::after{
      content:""; position:absolute; inset:0; pointer-events:none; opacity:0;
      background: radial-gradient(160px 160px at var(--mx) var(--my), rgba(255,255,255,.22), transparent 60%);
      transition: opacity .25s ease; z-index:2;
    }

    /* Hovers = louder + faster + hue shift */
    footer li a:hover{
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 18px 44px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.18);
      border-color: transparent; filter: saturate(1.25) brightness(1.07) hue-rotate(8deg);
    }
    footer li a:hover::after{ opacity:1; }
    footer li a:hover .sheen{ opacity:1; animation: sweep .9s ease; }
    footer li a:hover .scan{ opacity:.35; }
    footer li a:hover .rainbow{ animation-duration: 6.5s; opacity:.32; }
    footer li a:hover .flux{ animation-duration: 3.2s; opacity:.72; }
    footer li a:hover .sparks{ animation-duration: 1.6s; }

    @keyframes sweep{ from{ left:-50%; } to{ left:130%; } }

    /* Ripple (click) */
    .rip{
      position:absolute; width:10px; height:10px; border-radius:999px;
      background: radial-gradient(circle at center, rgba(255,255,255,.95), rgba(124,131,255,.3) 60%, transparent 70%);
      transform: translate(-50%, -50%) scale(0);
      pointer-events:none;
      animation: ripExpand .8s ease-out forwards;
      mix-blend-mode: screen; z-index:6;
    }
    @keyframes ripExpand{
      0%{ transform: translate(-50%, -50%) scale(0); opacity:.95; }
      70%{ transform: translate(-50%, -50%) scale(12); opacity:.4; }
      100%{ transform: translate(-50%, -50%) scale(16); opacity:0; }
    }

    /* Cursor ring */
    .cursor-ring{
      position:fixed; z-index:200; pointer-events:none;
      width:34px; height:34px; border-radius:999px;
      border:1.5px solid rgba(255,255,255,.65);
      mix-blend-mode: difference; opacity:.95;
      transform: translate(-50%, -50%) scale(1);
      transition: transform .18s ease, width .18s ease, height .18s ease, opacity .22s ease;
    }
    .cursor-ring.hide{ opacity:0; }
    .cursor-ring.grow{ width:50px; height:50px; }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce){
      .page-transition, header, footer, #content { transition: none !important; animation: none !important; }
      .cursor-ring{ display:none !important; }
    }

    /* ================================================================
       SITE-WIDE FX v2
       ================================================================ */

    /* 1 · particle canvas removed for performance */
    #bgCanvas{ display:none; }

    /* 2 · Aurora nebula — no blur, transform-only animation = free on GPU */
    .aurora-global{
      position:fixed; inset:-15%; z-index:-4; pointer-events:none;
      contain: strict;
      background:
        radial-gradient(70% 60% at 15% 10%, rgba(124,131,255,.22), transparent 70%),
        radial-gradient(55% 55% at 88% 20%, rgba(34,211,238,.17), transparent 70%),
        radial-gradient(62% 56% at 48% 90%, rgba(52,211,153,.14), transparent 72%),
        radial-gradient(48% 44% at 20% 70%, rgba(244,114,182,.13), transparent 68%);
      animation: auroraGlobalDrift 26s ease-in-out infinite alternate;
      will-change: transform;
    }
    @keyframes auroraGlobalDrift{
      0%  { transform:translate(0,0); }
      50% { transform:translate(2vw,-1.5vh); }
      100%{ transform:translate(-1.5vw,1vh); }
    }
    /* 2b · Deep aurora */
    .aurora-deep{
      position:fixed; inset:-15%; z-index:-4; pointer-events:none;
      contain: strict;
      background:
        radial-gradient(44% 40% at 78% 88%, rgba(99,102,241,.13), transparent 70%),
        radial-gradient(34% 32% at 58% 8%,  rgba(244,114,182,.09), transparent 65%);
      animation: auroraDeepDrift 38s ease-in-out infinite alternate;
      will-change: transform;
    }
    @keyframes auroraDeepDrift{
      0%  { transform:translate(0,0); }
      100%{ transform:translate(-2vw,2vh); }
    }

    /* 2c · Slow-rotating conic aurora ring — pure GPU transform, zero repaint */
    .aurora-ring{
      position:fixed; inset:-15%; z-index:-5; pointer-events:none;
      contain: strict;
      background: conic-gradient(from 0deg at 30% 60%,
        rgba(124,131,255,.07),
        rgba(34,211,238,.05),
        rgba(52,211,153,.06),
        rgba(244,114,182,.05),
        rgba(245,158,11,.04),
        transparent 50%,
        rgba(124,131,255,.07));
      animation: ringRotate 80s linear infinite;
      will-change: transform;
    }
    @keyframes ringRotate{ to{ transform: rotate(360deg); } }

    /* 3 · Ambient orbs — no blur, pure opacity fade = zero repaint */
    .orbs-layer{ position:fixed; inset:0; z-index:-4; pointer-events:none; overflow:hidden; contain: strict; }
    .orb{ position:absolute; border-radius:50%; mix-blend-mode:screen; }
    .orb:nth-child(1){
      width:600px; height:600px; top:-150px; left:-150px;
      background:radial-gradient(circle, rgba(124,131,255,.18) 0%, transparent 68%);
      animation: orbFade 28s ease-in-out infinite alternate, orbDrift1 34s ease-in-out infinite alternate;
    }
    .orb:nth-child(2){
      width:500px; height:500px; bottom:-130px; right:-130px;
      background:radial-gradient(circle, rgba(34,211,238,.16) 0%, transparent 68%);
      animation: orbFade 22s ease-in-out infinite alternate-reverse, orbDrift2 40s ease-in-out infinite alternate;
      animation-delay:-11s, -20s;
    }
    .orb:nth-child(3), .orb:nth-child(4){ display:none; }
    @keyframes orbFade{
      0%  { opacity:.7; }
      100%{ opacity:.3; }
    }
    @keyframes orbDrift1{ 0%{ transform:translate(0,0); } 100%{ transform:translate(100px,70px); } }
    @keyframes orbDrift2{ 0%{ transform:translate(0,0); } 100%{ transform:translate(-90px,-55px); } }

    /* 4 · Noise grid removed for performance */
    .noise-grid{ display:none !important; }

    /* 4b · Shooting stars */
    .meteors-layer{ position:fixed; inset:0; z-index:-3; pointer-events:none; overflow:hidden; contain: strict; }
    .meteor-star{
      position:absolute;
      width:160px; height:2px;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.9) 50%, rgba(124,131,255,.55) 80%, transparent 100%);
      border-radius:50%;
      opacity:0;
      filter: drop-shadow(0 0 5px rgba(124,131,255,.8));
      transform: rotate(-35deg);
      animation: meteorFly var(--dur,10s) var(--delay,0s) linear infinite;
    }
    .meteor-star:nth-child(1){ top:8%;  left:-180px; --dur:10s; --delay:0s;   }
    .meteor-star:nth-child(2){ top:28%; left:-180px; --dur:15s; --delay:5s;   }
    .meteor-star:nth-child(3){ top:52%; left:-180px; --dur:12s; --delay:9s;   }
    .meteor-star:nth-child(4){ top:72%; left:-180px; --dur:18s; --delay:3s;   }
    .meteor-star:nth-child(5){ top:18%; left:-180px; --dur:22s; --delay:14s;  }
    .meteor-star:nth-child(6){ top:62%; left:-180px; --dur:11s; --delay:7.5s; }
    /* extra meteors hidden */
    .meteor-star:nth-child(n+7){ display:none; }

    /* scan-beam removed for performance */
    .scan-beam{ display:none !important; }
    @keyframes meteorFly{
      0%  { transform: translateX(0)             rotate(-35deg); opacity:0;   }
      4%  { opacity:1; }
      80% { opacity:.5; }
      90% { transform: translateX(calc(100vw + 200px)) rotate(-35deg); opacity:0; }
      100%{ transform: translateX(calc(100vw + 200px)) rotate(-35deg); opacity:0; }
    }

    /* 5 · Global mouse spotlight */
    .spotlight-global{
      position:fixed; inset:0; z-index:-2; pointer-events:none;
      background:radial-gradient(700px circle at var(--gx,50%) var(--gy,50%),
        rgba(124,131,255,.055) 0%,
        rgba(34,211,238,.025) 40%,
        transparent 70%);
    }

    /* 6 · Holographic shimmer (injected via JS into every card) */
    .holo-shimmer{
      position:absolute; inset:0; border-radius:inherit;
      pointer-events:none; z-index:20; opacity:0;
      mix-blend-mode:screen; transition:opacity .28s ease;
    }

    /* 7 · Header glitch */
    .glitch-title{ position:relative; display:inline-block; }
    .glitch-title .gl1,
    .glitch-title .gl2{
      position:absolute; inset:0; pointer-events:none;
      background:linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent3));
      -webkit-background-clip:text; background-clip:text; color:transparent;
      opacity:0;
    }
    .glitch-title .gl1{ animation: glitchA  9s 0s   infinite linear; }
    .glitch-title .gl2{ animation: glitchB 11s 1.5s infinite linear; }
    @keyframes glitchA{
      0%,88%,100%{ clip-path:none; transform:none; opacity:0; }
      90%{ clip-path:polygon(0 25%,100% 25%,100% 42%,0 42%); transform:translate(-3px,0); opacity:.75; }
      92%{ clip-path:polygon(0 60%,100% 60%,100% 72%,0 72%); transform:translate( 3px,0); opacity:.65; }
      94%{ clip-path:polygon(0 42%,100% 42%,100% 58%,0 58%); transform:translate(-1px,0); opacity:.55; }
      96%{ clip-path:none; transform:none; opacity:0; }
    }
    @keyframes glitchB{
      0%,82%,100%{ clip-path:none; transform:none; opacity:0; }
      84%{ clip-path:polygon(0 50%,100% 50%,100% 65%,0 65%); transform:translate( 2px,0); opacity:.65; }
      86%{ clip-path:polygon(0 15%,100% 15%,100% 32%,0 32%); transform:translate(-2px,0); opacity:.60; }
      88%{ clip-path:none; transform:none; opacity:0; }
    }

    /* 8 · Animated gradient on section titles */
    .section-title, .cheats-h2{
      background: linear-gradient(90deg,var(--accent1),var(--accent2),var(--accent3),var(--accent1)) !important;
      background-size: 300% 100% !important;
      -webkit-background-clip: text !important;
      background-clip: text !important;
      -webkit-text-fill-color: transparent !important;
      color: transparent !important;
      animation: gradientShift 6s linear infinite !important;
    }
    @keyframes gradientShift{ 0%{ background-position:0% 50%; } 100%{ background-position:300% 50%; } }

    /* 9a · Card/article header element reset (stop global `header{}` rules leaking in) */
    article header, .card header, .note-card header, .project-card header, .course-card header {
      position:static !important; display:block !important; background:none !important;
      backdrop-filter:none !important; border-bottom:none !important; box-shadow:none !important;
      z-index:auto !important; padding:0 !important; grid-template-columns:none !important;
      color:inherit !important; gap:0 !important; align-items:initial !important;
    }

    /* 9b · Card hover neon border pulse */
    .project-card:hover, .note-card:hover, .card:hover {
      animation: cardNeonPulse 2s ease-in-out infinite !important;
    }
    @keyframes cardNeonPulse {
      0%,100%{ box-shadow: 0 0 0 1px rgba(124,131,255,.6), 0 0 28px rgba(124,131,255,.32), 0 30px 70px rgba(0,0,0,.6); border-color: rgba(124,131,255,.5) !important; }
      50%    { box-shadow: 0 0 0 2px rgba(34,211,238,.7),  0 0 44px rgba(34,211,238,.42), 0 0 90px rgba(52,211,153,.22), 0 30px 70px rgba(0,0,0,.6); border-color: rgba(34,211,238,.6) !important; }
    }

    /* 9c · Chromatic aberration boost on gradient card titles (hover) */
    .project-card:hover .pc-title {
      filter: drop-shadow(-2px 0 0 rgba(244,114,182,.75)) drop-shadow(2px 0 0 rgba(124,131,255,.75)) drop-shadow(0 0 28px rgba(34,211,238,.7)) !important;
      animation-duration: 1.8s !important;
    }
    .note-card:hover .note-text h3 {
      filter: drop-shadow(-2px 0 0 rgba(244,114,182,.7)) drop-shadow(2px 0 0 rgba(124,131,255,.7)) drop-shadow(0 0 22px rgba(34,211,238,.65)) !important;
      animation-duration: 1.8s !important;
    }
    .card:hover header {
      filter: drop-shadow(-2px 0 0 rgba(244,114,182,.75)) drop-shadow(2px 0 0 rgba(124,131,255,.75)) drop-shadow(0 0 28px rgba(34,211,238,.7)) !important;
    }

    /* 9 · Click burst dot */
    .burst-dot{
      position:fixed; width:5px; height:5px; border-radius:50%;
      pointer-events:none; z-index:9998; transform:translate(-50%,-50%);
    }

    /* Reduced-motion: hide new fx */
    @media(prefers-reduced-motion:reduce){
      .aurora-global,.aurora-deep,.aurora-ring,.orb,.noise-grid,#bgCanvas,.meteors-layer,.scan-beam{ animation:none !important; display:none !important; }
      .holo-shimmer{ display:none !important; }
      .glitch-title .gl1,.glitch-title .gl2{ display:none !important; }
      .project-card:hover,.note-card:hover,.card:hover{ animation:none !important; }
      .section-title,.cheats-h2{
        animation:none !important;
        background:none !important;
        color:var(--ink) !important;
        -webkit-text-fill-color:var(--ink) !important;
        -webkit-background-clip:unset !important;
        background-clip:unset !important;
      }
    }
  </style>
</head>

  <!-- Layout JS -->
  <script>
    (function(){
      const $doc = $(document);
      const $content = $('#content');
      const $transition = $('#page-transition');
      const $progress = $('#scrollProgress');
      const cursor = document.getElementById('cursor');

      /* Reveal on load/back */
      function reveal(){ $content.addClass('visible'); }
      $(window).on('pageshow', reveal);
      $doc.ready(reveal);

      /* Scroll progress + header border */
      function onScroll(){
        const h = document.documentElement;
        const max = h.scrollHeight - h.clientHeight;
        const pct = max ? (h.scrollTop / max) * 100 : 0;
        $progress.css('width', pct + '%');
        document.body.classList.toggle('scrolled', window.scrollY > 6);
      }
      onScroll();
      window.addEventListener('scroll', onScroll, { passive:true });

      /* Magnetic hover (header icons) */
      document.querySelectorAll('header a').forEach(el=>{
        el.addEventListener('mousemove', (e)=>{
          const r = el.getBoundingClientRect();
          el.style.setProperty('--mx', (e.clientX - r.left) + 'px');
          el.style.setProperty('--my', (e.clientY - r.top) + 'px');
        }, {passive:true});
      });

      /* Prefetch on hover */
      const prefetchCache = new Set();
      function prefetch(href){
        if (!href || prefetchCache.has(href)) return;
        prefetchCache.add(href);
        const l = document.createElement('link');
        l.rel = 'prefetch'; l.href = href; document.head.appendChild(l);
      }
      document.querySelectorAll('footer a, header a, a').forEach(a=>{
        if(a.target === '_blank' || (a.getAttribute('href')||'').startsWith('mailto:')) return;
        a.addEventListener('mouseenter', ()=>prefetch(a.href), {passive:true});
      });

      /* Radial page transition + content dissolve for internal links */
      function isInternalLink(a){
        try {
          const url = new URL(a.href, window.location.href);
          return url.origin === window.location.origin;
        } catch { return false; }
      }
      function startTransition(x, y){
        $transition.css('--x', x + 'px');
        $transition.css('--y', y + 'px');
        $transition.addClass('page-transition-active');
        $content.addClass('leaving');
      }
      function endTransition(){
        $transition.removeClass('page-transition-active');
        $content.removeClass('leaving');
      }
      document.addEventListener('click', (e)=>{
        const a = e.target.closest('a');
        if(!a) return;

        if (a.target === '_blank' || a.hasAttribute('download')) return;
        const href = a.getAttribute('href') || '';
        if (href.startsWith('#') || href.startsWith('mailto:') || href.startsWith('javascript:')) return;
        if (!isInternalLink(a)) return;

        e.preventDefault();
        const x = e.clientX || (innerWidth/2);
        const y = e.clientY || (innerHeight/2);
        startTransition(x, y);
        setTimeout(()=>{ window.location.href = a.href; }, 1000);
      });
      window.addEventListener('pageshow', endTransition);

      /* Cursor ring (desktop) — updated by snake trail loop below */
      let isTouch = false;
      window.addEventListener('touchstart', ()=>{ isTouch = true; cursor.classList.add('hide'); }, {passive:true});
      if(!isTouch){
        window.addEventListener('mousemove', (e)=>{ cursor.classList.remove('hide'); }, {passive:true});
        const growSelectors = 'a, button, .cool-btn, .card, .glass';
        document.addEventListener('mouseover', e=>{
          cursor.classList.toggle('grow', !!e.target.closest(growSelectors));
        }, {passive:true});
      }

      /* Soft reveal on scroll */
      const observer = new IntersectionObserver((entries)=>{
        entries.forEach(ent=>{
          if(ent.isIntersecting){
            ent.target.style.transition = 'opacity .7s ease, transform .7s ease';
            ent.target.style.opacity = '1';
            ent.target.style.transform = 'translateY(0)';
            observer.unobserve(ent.target);
          }
        });
      }, { rootMargin: '0px 0px -10% 0px', threshold: 0.05 });
      document.querySelectorAll('section, .card, .glass').forEach(el=>{
        el.style.opacity = .0; el.style.transform = 'translateY(8px)';
        observer.observe(el);
      });

      /* Footer dock: magnetic glow, micro-tilt, ripple */
      const footerNav = document.getElementById('footerNav');
      if (footerNav){
        footerNav.querySelectorAll('a').forEach(a=>{
          a.addEventListener('mousemove', (e)=>{
            const r = a.getBoundingClientRect();
            a.style.setProperty('--mx', (e.clientX - r.left) + 'px');
            a.style.setProperty('--my', (e.clientY - r.top) + 'px');

            const dx = (e.clientX - (r.left + r.width/2)) / (r.width/2);
            const dy = (e.clientY - (r.top + r.height/2)) / (r.height/2);
            a.style.transform = `translateY(-3px) scale(1.05) rotateX(${(-dy*2).toFixed(2)}deg) rotateY(${(dx*2).toFixed(2)}deg)`;
          }, {passive:true});

          a.addEventListener('mouseleave', ()=>{ a.style.transform=''; });

          a.addEventListener('click', (e)=>{
            const rip = document.createElement('span');
            rip.className = 'rip';
            const r = a.getBoundingClientRect();
            rip.style.left = (e.clientX - r.left) + 'px';
            rip.style.top  = (e.clientY - r.top) + 'px';
            a.appendChild(rip);
            rip.addEventListener('animationend', ()=> rip.remove());
          });
        });
      }
    })();
  </script>

  <!-- ============================================================
       SITE-WIDE FX v2 — particle network · glitch · tilt · scramble · burst
       ============================================================ -->
  <script>
  (function () {
    'use strict';
    const REDUCE = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const ACCENT  = ['#7c83ff','#22d3ee','#34d399','#a78bfa','#f472b6','#60a5fa'];

    /* ── 1. PARTICLE NETWORK REMOVED — too CPU-heavy ──────────────── */

    /* ── 2 + 2b. UNIFIED MOUSE EFFECTS LOOP (spotlight + aurora parallax) ── */
    !function(){
      const spotlight = document.getElementById('spotlightGlobal');
      const aurora    = REDUCE ? null : document.querySelector('.aurora-global');
      const deep      = REDUCE ? null : document.querySelector('.aurora-deep');
      let mx=innerWidth/2, my=innerHeight/2;
      let scx=mx, scy=my;
      let acx=0, acy=0, atx=0, aty=0;
      window.addEventListener('mousemove', e=>{
        mx=e.clientX; my=e.clientY;
        atx = (mx/innerWidth  - .5) * 18;
        aty = (my/innerHeight - .5) * 12;
      }, {passive:true});
      (function tick(){
        // spotlight
        if(spotlight){
          scx+=(mx-scx)*.08; scy+=(my-scy)*.08;
          spotlight.style.setProperty('--gx', scx.toFixed(0)+'px');
          spotlight.style.setProperty('--gy', scy.toFixed(0)+'px');
        }
        // aurora parallax — use transform (GPU composited, no layout)
        if(aurora){
          acx+=(atx-acx)*.03; acy+=(aty-acy)*.03;
          aurora.style.transform = `translate(${acx.toFixed(1)}px,${acy.toFixed(1)}px)`;
          if(deep){ deep.style.transform = `translate(${(-acx*.5).toFixed(1)}px,${(-acy*.5).toFixed(1)}px)`; }
        }
        requestAnimationFrame(tick);
      })();
    }();

    /* ── 3. HEADER GLITCH TITLE ─────────────────────────────────────── */
    !function(){
      const h1 = document.querySelector('header h1');
      if(!h1) return;
      h1.classList.add('glitch-title');
      const txt = h1.firstChild && h1.firstChild.nodeType===3 ? h1.firstChild.nodeValue.trim() : h1.textContent.trim();
      ['gl1','gl2'].forEach(cls=>{
        const s = document.createElement('span');
        s.className=cls; s.setAttribute('aria-hidden','true'); s.textContent=txt;
        h1.appendChild(s);
      });
    }();

    /* ── 4. 3D CARD TILT + HOLOGRAPHIC SHIMMER ──────────────────────── */
    !function(){
      if(REDUCE || navigator.maxTouchPoints>0) return;

      function initTilt(el){
        if(el.dataset.tiltInit) return;
        el.dataset.tiltInit='1';
        if(getComputedStyle(el).position==='static') el.style.position='relative';
        const shimmer = document.createElement('div');
        shimmer.className='holo-shimmer';
        el.appendChild(shimmer);
        const ownTilt = el.hasAttribute('data-tilt'); // page-level handler owns the transform

        el.addEventListener('mousemove', e=>{
          const r=el.getBoundingClientRect();
          const x=(e.clientX-r.left)/r.width, y=(e.clientY-r.top)/r.height;
          shimmer.style.background=`radial-gradient(140px 140px at ${(x*100).toFixed(1)}% ${(y*100).toFixed(1)}%,rgba(255,255,255,.17) 0%,rgba(124,131,255,.08) 45%,transparent 72%)`;
          shimmer.style.opacity='1';
          if(!ownTilt){
            const rx=(y-.5)*-12, ry=(x-.5)*12;
            el.style.transition='transform .08s ease,box-shadow .22s ease';
            el.style.transform=`perspective(900px) rotateX(${rx.toFixed(2)}deg) rotateY(${ry.toFixed(2)}deg) scale(1.018) translateZ(4px)`;
            el.style.boxShadow=`0 0 0 1px rgba(124,131,255,.32),0 0 28px rgba(124,131,255,.11),0 24px 60px rgba(0,0,0,.46)`;
          }
        }, {passive:true});

        el.addEventListener('mouseleave', ()=>{
          shimmer.style.opacity='0';
          if(!ownTilt){
            el.style.transition='transform .4s cubic-bezier(.25,.46,.45,.94),box-shadow .4s ease';
            el.style.transform=''; el.style.boxShadow='';
          }
        });
      }

      function scan(){ document.querySelectorAll('.card,.glass,.note-card,.tilt-card,.glass.card,.project-card,[data-tilt]').forEach(initTilt); }
      scan();
      const mo = new MutationObserver(scan);
      const content = document.getElementById('content');
      if(content) mo.observe(content, {childList:true, subtree:true});
    }();

    /* ── 5. TEXT SCRAMBLE on scroll-reveal ──────────────────────────── */
    !function(){
      if(REDUCE) return;
      const CHARS='ABCDEFGHIJKLMNOPQRSTUVWXYZ∑∫∂∇αβγδεζθλμπσφψω#$%01289';
      function scramble(el){
        const orig = el.dataset.sOrig || el.textContent;
        el.dataset.sOrig = orig;
        let f=0; const total=orig.length*2|0;
        const iv = setInterval(()=>{
          el.textContent = orig.split('').map((ch,i)=>{
            if(ch===' '||ch==='\n') return ch;
            return i<((f/2)|0) ? ch : CHARS[Math.floor(Math.random()*CHARS.length)];
          }).join('');
          if(++f>=total){ el.textContent=orig; clearInterval(iv); }
        }, 14);
      }
      const obs = new IntersectionObserver(entries=>{
        entries.forEach(e=>{ if(e.isIntersecting){ scramble(e.target); obs.unobserve(e.target); } });
      }, {threshold:.6});
      document.querySelectorAll('h2,h3').forEach(h=>{
        if(!h.closest('header') && !h.closest('footer') && h.children.length===0) obs.observe(h);
      });
    }();

    /* ── 6. CLICK BURST ──────────────────────────────────────────────── */
    !function(){
      document.addEventListener('click', e=>{
        for(let i=0; i<14; i++){
          const dot = document.createElement('div');
          dot.className='burst-dot';
          const c = ACCENT[Math.floor(Math.random()*ACCENT.length)];
          dot.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;background:${c};box-shadow:0 0 6px 1px ${c};`;
          document.body.appendChild(dot);
          const ang=(i/14)*Math.PI*2+Math.random()*.4, dist=55+Math.random()*70;
          dot.animate([
            {transform:'translate(-50%,-50%) scale(1.4)', opacity:1},
            {transform:`translate(calc(-50% + ${(Math.cos(ang)*dist).toFixed(0)}px),calc(-50% + ${(Math.sin(ang)*dist).toFixed(0)}px)) scale(0)`,opacity:0}
          ],{duration:500+Math.random()*350, easing:'cubic-bezier(.25,.46,.45,.94)', fill:'forwards'})
            .finished.then(()=>dot.remove());
        }
      });
    }();

    /* ── 7. CURSOR SNAKE TRAIL + RING (single rAF loop) ────────────── */
    !function(){
      if(REDUCE || navigator.maxTouchPoints > 0) return;
      const N = 10;
      const xs = [], ys = [];
      for(let i=0;i<N;i++){ xs.push(innerWidth/2); ys.push(innerHeight/2); }
      const trailCanvas = document.createElement('canvas');
      trailCanvas.style.cssText='position:fixed;inset:0;width:100%;height:100%;z-index:197;pointer-events:none;';
      document.body.appendChild(trailCanvas);
      const tCtx = trailCanvas.getContext('2d');
      function resizeTrail(){ trailCanvas.width=innerWidth; trailCanvas.height=innerHeight; }
      resizeTrail();
      window.addEventListener('resize', resizeTrail, {passive:true});
      let mx = innerWidth/2, my = innerHeight/2;
      let ringX = mx, ringY = my;
      const ring = document.getElementById('cursor');
      window.addEventListener('mousemove', e=>{ mx=e.clientX; my=e.clientY; }, {passive:true});
      (function loop(){
        xs[0]+=(mx-xs[0])*.32; ys[0]+=(my-ys[0])*.32;
        for(let i=1;i<N;i++){ xs[i]+=(xs[i-1]-xs[i])*.28; ys[i]+=(ys[i-1]-ys[i])*.28; }
        // cursor ring
        if(ring){ ringX+=(mx-ringX)*.20; ringY+=(my-ringY)*.20;
          ring.style.transform=`translate(${ringX.toFixed(1)}px,${ringY.toFixed(1)}px) translate(-50%,-50%)`; }
        // trail canvas
        tCtx.clearRect(0,0,trailCanvas.width,trailCanvas.height);
        for(let i=0;i<N;i++){
          const frac = 1 - i/N;
          const r    = Math.max(1, Math.round(6*frac));
          tCtx.beginPath();
          tCtx.arc(xs[i], ys[i], r, 0, Math.PI*2);
          tCtx.fillStyle = ACCENT[i % ACCENT.length];
          tCtx.globalAlpha = frac * .65;
          tCtx.fill();
        }
        tCtx.globalAlpha = 1;
        requestAnimationFrame(loop);
      })();
    }();

  })();
  </script>
</body>
